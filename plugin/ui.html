<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="./ui.css">
</head>

<body>

  <!-- ═══ MAIN VIEW ═══ -->
  <div id="mainView" class="view">
    <div class="app-header">
      <h2>Visant Copilot</h2>
      <button class="icon-btn" onclick="openSettings()" title="Configurações">⚙</button>
    </div>

    <div id="status"></div>

    <div class="chat-messages-wrap">
      <div class="chat-messages" id="chatMessages"></div>
    </div>

    <!-- Figma-style chat card -->
    <div class="chat-card">
      <div class="chat-card-toolbar">
        <button class="tool-btn" title="Código"
          style="font-family: monospace; font-size: 11px; font-weight: 700;">&lt;/&gt;</button>
        <button class="tool-btn" title="Imagem">🖼</button>
      </div>
      <textarea id="chatInput" placeholder="Descreva o design que quer criar ou modificar..." rows="2"></textarea>
      <div id="selectionIndicator" class="selection-indicator hidden"></div>
      <div class="chat-card-footer">
        <div class="chat-card-pills">
          <button class="chat-pill" id="brandPill">🎨 Brand</button>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendChat()" title="Enviar (Enter)">↑</button>
      </div>
    </div>

    <div class="context" id="contextInfo" style="margin-top: 8px;"></div>
  </div>

  <!-- ═══ SETTINGS VIEW ═══ -->
  <div id="settingsView" class="view hidden">
    <div class="settings-header">
      <button class="back-btn" onclick="closeSettings()" title="Voltar">←</button>
      <span>Configurações</span>
    </div>

    <!-- Brand Guidelines -->
    <div class="brand-guidelines">
      <div class="brand-guidelines-title">Brand Guidelines</div>

      <!-- Logo -->
      <div class="brand-row">
        <div class="brand-row-header">
          <div class="brand-row-left">
            <span class="brand-row-icon">◇</span>
            <span class="brand-row-label">Logo</span>
          </div>
          <div class="brand-row-preview" id="logoPreview"></div>
          <button class="brand-add-btn" onclick="toggleBrandPanel('logo')" title="Adicionar logo">+</button>
        </div>
        <div class="brand-panel hidden" id="logoPanel">
          <button type="button" class="brand-panel-action" onclick="useSelectionAsLogo()">
            <span>◎</span> Usar seleção atual
          </button>
          <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 8px;">
            <input type="text" id="componentSearch" class="brand-panel-search" placeholder="Pesquisar componentes..."
              oninput="renderComponentsLibrary()" style="flex: 1;">
            <label style="display: flex; align-items: center; gap: 4px; font-size: 11px; white-space: nowrap; cursor: pointer;">
              <input type="checkbox" id="showFoldersCheckbox" onchange="toggleShowFolders()" style="cursor: pointer;">
              <span>Pastas</span>
            </label>
          </div>
          <div id="componentsLibrary" class="components-library"></div>
        </div>
      </div>

      <!-- Cores -->
      <div class="brand-row">
        <div class="brand-row-header">
          <div class="brand-row-left">
            <span class="brand-row-icon brand-row-icon-dot">●</span>
            <span class="brand-row-label">Cores</span>
          </div>
          <div class="brand-row-preview" id="colorsPreview"></div>
          <button class="brand-add-btn" onclick="toggleBrandPanel('colors')" title="Adicionar cores">+</button>
        </div>
        <div class="brand-panel hidden" id="colorsPanel">
          <div class="color-grid" id="colorGrid"></div>
          <div class="brand-panel-empty hidden" id="colorGridEmpty">Nenhuma variável de cor no arquivo</div>
        </div>
      </div>

      <!-- Fontes -->
      <div class="brand-row">
        <div class="brand-row-header">
          <div class="brand-row-left">
            <span class="brand-row-icon brand-row-icon-font">A</span>
            <span class="brand-row-label">Fontes</span>
          </div>
          <div class="brand-row-preview" id="fontsPreview"></div>
          <button class="brand-add-btn" onclick="toggleBrandPanel('fonts')" title="Adicionar fonte">+</button>
        </div>
        <div class="brand-panel hidden" id="fontsPanel">
          <div class="font-tabs">
            <button class="font-tab active" id="fontTabLibrary" onclick="switchFontTab('library')">Biblioteca</button>
            <button class="font-tab" id="fontTabAll" onclick="switchFontTab('all')">Todas</button>
          </div>
          <input type="text" id="fontSearch" class="brand-panel-search" placeholder="Pesquisar fontes..."
            oninput="renderFontList()">
          <div class="font-list" id="fontList"></div>
        </div>
      </div>
    </div>

    <!-- API Key (BYOK) -->
    <div class="settings-section">
      <div class="settings-section-header" onclick="toggleApiSection()">
        <span class="settings-section-chevron collapsed" id="apiChevron">▾</span>
        <span class="settings-section-title">Gemini API Key (BYOK)</span>
      </div>
      <div class="settings-section-content hidden" id="apiContent">
        <p
          style="font-size: 11px; color: var(--figma-color-text-secondary, #808080); margin-bottom: 10px; line-height: 1.5;">
          Sua chave é salva localmente no Figma. Se vazio, usa a chave do servidor.
        </p>
        <div style="display: flex; gap: 6px; align-items: center;">
          <input type="password" id="apiKeyInput" placeholder="AIza..." style="flex: 1; margin-bottom: 0;">
          <button type="button" class="secondary" onclick="saveApiKey()"
            style="width: auto; padding: 0 12px; flex-shrink: 0;">Salvar</button>
        </div>
        <div id="apiKeyStatus"
          style="font-size: 10px; margin-top: 6px; color: var(--figma-color-text-secondary, #808080);"></div>
      </div>
    </div>
  </div>

  <script src="./ui.js"></script>
</body>

</html>
