<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visant Copilot Documentation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Red+Hat+Mono:wght@400;500;600&display=swap');

        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Light Theme Tokens */
            --bg-primary: oklch(1 0 0);
            /* background */
            --bg-secondary: oklch(0.97 0 0);
            /* secondary/card */
            --bg-tertiary: oklch(0.922 0 0);
            /* muted */
            --text-primary: oklch(0.145 0 0);
            /* foreground */
            --text-secondary: oklch(0.556 0 0);
            /* muted-foreground */
            --text-tertiary: oklch(0.708 0 0);
            --border-color: oklch(0.922 0 0);
            /* border */
            --accent-color: oklch(0.81 0.156 198.6);
            /* brand-cyan */
            --accent-hover: oklch(0.75 0.156 198.6);
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
            --code-bg: oklch(0.97 0 0);
            /* secondary */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);

            /* Custom Scrollbar Widths */
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        html.dark-mode {
            /* Dark Theme Tokens */
            --bg-primary: oklch(0.145 0 0);
            /* background */
            --bg-secondary: oklch(0.205 0 0);
            /* card/sidebar */
            --bg-tertiary: oklch(0.269 0 0);
            /* secondary/muted */
            --text-primary: oklch(0.985 0 0);
            /* foreground */
            --text-secondary: oklch(0.708 0 0);
            /* muted-foreground */
            --text-tertiary: oklch(0.556 0 0);
            --border-color: oklch(0.269 0 0);
            /* border */
            --code-bg: oklch(0.205 0 0);
            /* card */
        }

        body {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.2s, color 0.2s;
        }

        /* Heading Styles */
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
        }

        /* Header */
        .docs-header {
            background-color: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background-color: color-mix(in srgb, var(--bg-primary), transparent 20%);
        }

        .docs-header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .docs-logo {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .docs-logo::before {
            content: '';
            display: block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
        }

        .docs-header-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            color: var(--text-primary);
            font-size: 1.2rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .theme-toggle:hover {
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

        /* Main Layout */
        .docs-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            gap: 2rem;
            padding: 2rem;
            min-height: calc(100vh - 70px);
        }

        /* Sidebar */
        .docs-sidebar {
            padding: 1rem 0;
            border-right: 1px solid var(--border-color);
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }

        .docs-sidebar-section {
            margin-bottom: 2rem;
        }

        .docs-sidebar-title {
            font-family: 'Red Hat Mono', monospace;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-tertiary);
            padding: 0.5rem 1rem;
            margin-bottom: 0.5rem;
        }

        .docs-sidebar-link {
            display: block;
            padding: 0.5rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 0.375rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9375rem;
            margin: 0.125rem 0.5rem;
        }

        .docs-sidebar-link:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            transform: translateX(2px);
        }

        .docs-sidebar-link.active {
            background-color: color-mix(in srgb, var(--accent-color), transparent 85%);
            color: var(--accent-color);
            font-weight: 500;
        }

        /* Main Content */
        .docs-content {
            padding: 1rem 2rem;
            border-right: 1px solid var(--border-color);
        }

        .docs-content h1 {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .docs-content h2 {
            font-size: 1.75rem;
            margin: 2.5rem 0 1rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .docs-content h3 {
            font-size: 1.25rem;
            margin: 1.5rem 0 0.75rem 0;
            color: var(--text-primary);
        }

        .docs-content p {
            margin-bottom: 1.25rem;
            color: var(--text-secondary);
        }

        .docs-content a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.2s;
        }

        .docs-content a:hover {
            color: var(--text-primary);
            text-decoration: underline;
        }

        .docs-content ul,
        .docs-content ol {
            margin-bottom: 1.25rem;
            padding-left: 1.5rem;
            color: var(--text-secondary);
        }

        .docs-content li {
            margin-bottom: 0.5rem;
        }

        /* Endpoint Card */
        .endpoint-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 0.625rem;
            /* matching var(--radius) */
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .endpoint-card:hover {
            border-color: color-mix(in srgb, var(--accent-color), transparent 50%);
            box-shadow: 0 10px 15px -3px color-mix(in srgb, var(--bg-primary), transparent 90%),
                0 4px 6px -4px color-mix(in srgb, var(--accent-color), transparent 90%);
            transform: translateY(-2px);
        }

        .endpoint-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .method-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 0.375rem;
            font-family: 'Red Hat Mono', monospace;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: white;
            letter-spacing: 0.05em;
        }

        .method-get {
            background-color: #10b981;
        }

        .method-post {
            background-color: #f59e0b;
        }

        .method-put {
            background-color: #3b82f6;
        }

        .method-delete {
            background-color: #ef4444;
        }

        .endpoint-path {
            font-family: 'Red Hat Mono', "Monaco", "Courier New", monospace;
            font-size: 0.95rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .endpoint-description {
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .param-section {
            margin-top: 1.5rem;
        }

        .param-section-title {
            font-family: 'Red Hat Mono', monospace;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-tertiary);
            margin-bottom: 0.75rem;
        }

        .param-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.875rem;
            border-radius: 0.5rem;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .param-table th {
            background-color: var(--bg-tertiary);
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-color);
        }

        .param-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-primary);
        }

        .param-table tr:last-child td {
            border-bottom: none;
        }

        .param-name {
            font-family: 'Red Hat Mono', "Monaco", "Courier New", monospace;
            font-weight: 600;
            color: var(--accent-color);
        }

        .param-type {
            font-family: 'Red Hat Mono', monospace;
            color: var(--text-tertiary);
            font-size: 0.8rem;
            background-color: var(--bg-tertiary);
            padding: 0.125rem 0.375rem;
            border-radius: 0.25rem;
            display: inline-block;
        }

        .param-required {
            color: var(--error-color);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        /* Code Block */
        .code-block {
            background-color: var(--code-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 1.25rem;
            overflow-x: auto;
            margin: 1.25rem 0;
            position: relative;
        }

        .code-block pre {
            margin: 0;
            font-family: 'Red Hat Mono', "Monaco", "Courier New", monospace;
            font-size: 0.875rem;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .code-block-label {
            font-family: 'Red Hat Mono', monospace;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-tertiary);
            margin-bottom: 0.75rem;
        }

        .copy-btn {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: var(--bg-primary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            cursor: pointer;
            font-family: 'Manrope', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            color: var(--text-primary);
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

        /* MCP Tool Card */
        .mcp-tool-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 0.625rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.2s;
        }

        .mcp-tool-card:hover {
            border-color: var(--accent-color);
            box-shadow: 0 4px 12px -2px color-mix(in srgb, var(--accent-color), transparent 90%);
        }

        .mcp-tool-name {
            font-family: 'Red Hat Mono', "Monaco", "Courier New", monospace;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--accent-color);
            margin-bottom: 0.75rem;
            display: inline-block;
            background-color: color-mix(in srgb, var(--accent-color), transparent 90%);
            padding: 0.25rem 0.75rem;
            border-radius: 0.375rem;
        }

        /* Table of Contents */
        .docs-toc {
            padding: 1rem;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }

        .toc-title {
            font-weight: 600;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .toc-link {
            display: block;
            padding: 0.35rem 0;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8875rem;
            border-left: 2px solid transparent;
            padding-left: 0.75rem;
            transition: color 0.2s, border-color 0.2s;
        }

        .toc-link:hover {
            color: var(--accent-color);
        }

        .toc-link.active {
            color: var(--accent-color);
            border-left-color: var(--accent-color);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .docs-container {
                grid-template-columns: 200px 1fr;
                gap: 1.5rem;
            }

            .docs-toc {
                display: none;
            }
        }

        @media (max-width: 7610px) {
            .docs-container {
                grid-template-columns: 1fr;
                padding: 1rem;
            }

            .docs-sidebar {
                display: none;
            }

            .docs-content {
                border-right: none;
                padding: 0;
            }

            .docs-content h1 {
                font-size: 1.5rem;
            }

            .docs-header-content {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .endpoint-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }

        /* Print Styles */
        @media print {

            .docs-header,
            .docs-sidebar,
            .docs-toc,
            .theme-toggle,
            .copy-btn {
                display: none;
            }

            .docs-container {
                grid-template-columns: 1fr;
                gap: 0;
                padding: 0;
            }

            .docs-content {
                border: none;
                padding: 0;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="docs-header">
        <div class="docs-header-content">
            <a href="/api/docs" class="docs-logo">📚 Visant Docs</a>
            <div class="docs-header-controls">
                <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode">🌙</button>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="docs-container">
        <!-- Sidebar Navigation -->
        <aside class="docs-sidebar">
            <div class="docs-sidebar-section">
                <div class="docs-sidebar-title">Overview</div>
                <a href="/api/docs#overview" class="docs-sidebar-link">Introduction</a>
                <a href="/api/docs#getting-started" class="docs-sidebar-link">Getting Started</a>
            </div>

            <div class="docs-sidebar-section">
                <div class="docs-sidebar-title">API Reference</div>
                <a href="/api/docs/api#auth" class="docs-sidebar-link">Authentication</a>
                <a href="/api/docs/api#mockups" class="docs-sidebar-link">Mockups</a>
                <a href="/api/docs/api#plugin" class="docs-sidebar-link">Plugin</a>
                <a href="/api/docs#all-endpoints" class="docs-sidebar-link">All Endpoints</a>
            </div>

            <div class="docs-sidebar-section">
                <div class="docs-sidebar-title">Plugin</div>
                <a href="/api/docs/plugin" class="docs-sidebar-link">Overview</a>
                <a href="/api/docs/plugin/mcp" class="docs-sidebar-link">MCP Tools</a>
                <a href="/api/docs/plugin#setup" class="docs-sidebar-link">Setup Guide</a>
            </div>

            <div class="docs-sidebar-section">
                <div class="docs-sidebar-title">Resources</div>
                <a href="/api/docs/api/spec" class="docs-sidebar-link" target="_blank">OpenAPI Spec ↗</a>
                <a href="https://github.com/visantlabs/visantlabs-os" class="docs-sidebar-link" target="_blank">GitHub
                    ↗</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="docs-content" id="main-content">
            {{CONTENT}}
        </main>

        <!-- Table of Contents -->
        <aside class="docs-toc" id="table-of-contents">
            <div class="toc-title">On This Page</div>
            <nav id="toc-nav"></nav>
        </aside>
    </div>

    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;
        const isDarkMode = localStorage.getItem('darkMode') === 'true';

        if (isDarkMode) {
            htmlElement.classList.add('dark-mode');
            themeToggle.textContent = '☀️';
        }

        themeToggle.addEventListener('click', () => {
            const isDark = htmlElement.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', isDark);
            themeToggle.textContent = isDark ? '☀️' : '🌙';
        });

        // Copy to Clipboard
        document.querySelectorAll('.code-block').forEach((block) => {
            if (!block.querySelector('.copy-btn')) {
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.textContent = 'Copy';
                block.appendChild(btn);

                btn.addEventListener('click', async () => {
                    const code = block.querySelector('pre').textContent;
                    await navigator.clipboard.writeText(code);
                    btn.textContent = 'Copied!';
                    setTimeout(() => {
                        btn.textContent = 'Copy';
                    }, 2000);
                });
            }
        });

        // Generate Table of Contents
        const tocNav = document.getElementById('toc-nav');
        const mainContent = document.getElementById('main-content');

        if (mainContent) {
            const headings = mainContent.querySelectorAll('h2, h3');
            headings.forEach((heading) => {
                const id = heading.id || 'section-' + Math.random().toString(36).substr(2, 9);
                heading.id = id;

                const level = heading.tagName === 'H2' ? 0 : 1;
                const link = document.createElement('a');
                link.href = '#' + id;
                link.className = 'toc-link';
                link.style.paddingLeft = 0.75 + level * 0.75 + 'rem';
                link.textContent = heading.textContent;
                tocNav.appendChild(link);

                // Active link highlighting
                link.addEventListener('click', (e) => {
                    document.querySelectorAll('.toc-link.active').forEach((l) => {
                        l.classList.remove('active');
                    });
                    link.classList.add('active');
                });
            });

            // Highlight active section on scroll
            window.addEventListener('scroll', () => {
                headings.forEach((heading) => {
                    const rect = heading.getBoundingClientRect();
                    const link = tocNav.querySelector(`a[href="#${heading.id}"]`);
                    if (link && rect.top > -100 && rect.top < 300) {
                        document.querySelectorAll('.toc-link.active').forEach((l) => {
                            l.classList.remove('active');
                        });
                        link.classList.add('active');
                    }
                });
            });
        }
    </script>
</body>

</html>
