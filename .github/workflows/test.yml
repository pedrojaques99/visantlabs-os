name: Test Suite

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint-api-urls:
    name: No hardcoded /api/ fetch calls
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for hardcoded fetch('/api/
        run: |
          count=$(grep -rn "fetch('/api/" src/pages/ src/services/ --include="*.ts" --include="*.tsx" | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "❌ Found $count hardcoded fetch('/api/...) calls — use VITE_API_URL instead:"
            grep -rn "fetch('/api/" src/pages/ src/services/ --include="*.ts" --include="*.tsx"
            exit 1
          fi
          echo "✅ No hardcoded /api/ fetch calls found"

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run test:unit

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run test:integration

  e2e:
    name: E2E smoke
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run test:e2e

  coverage:
    name: Coverage (money + auth gates)
    runs-on: ubuntu-latest
    needs: [unit, integration]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run test:ci
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
